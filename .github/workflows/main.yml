name: Build Uellow Vendor APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Create fresh Flutter project
        run: |
          flutter create --org com.uellow --project-name uellow_vendor /tmp/fresh_app

      - name: Copy source files only (no android folder)
        run: |
          cp -r lib /tmp/fresh_app/
          cp -r assets /tmp/fresh_app/
          cp pubspec.yaml /tmp/fresh_app/

      - name: Ensure fonts exist
        run: |
          mkdir -p /tmp/fresh_app/assets/fonts
          python3 -c "
          import os, shutil
          base = '/tmp/fresh_app/assets/fonts'
          for f in ['Cairo-Regular.ttf','Cairo-Medium.ttf','Cairo-Bold.ttf']:
              p = f'{base}/{f}'
              if not os.path.exists(p):
                  src = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
                  shutil.copy(src, p) if os.path.exists(src) else open(p,'wb').write(bytes(16))
          "

      - name: Flutter pub get
        working-directory: /tmp/fresh_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: /tmp/fresh_app
        run: flutter analyze --no-fatal-infos || true

      - name: Build Release APK
        working-directory: /tmp/fresh_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uellow-vendor-apk
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
