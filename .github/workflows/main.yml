name: Build Uellow Vendor APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project from ZIP
        run: |
          unzip uellow_vendor_app.zip
          cp -r uellow_vendor_app/* .
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Ensure fonts exist
        run: |
          mkdir -p assets/fonts
          python3 -c "
          import os, shutil
          for f in ['Cairo-Regular.ttf','Cairo-Medium.ttf','Cairo-Bold.ttf']:
              p = f'assets/fonts/{f}'
              if not os.path.exists(p):
                  src = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
                  shutil.copy(src, p) if os.path.exists(src) else open(p,'wb').write(bytes(12))
          "

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uellow-vendor-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
